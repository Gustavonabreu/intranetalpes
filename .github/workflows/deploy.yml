name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Executar Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/intranet
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
